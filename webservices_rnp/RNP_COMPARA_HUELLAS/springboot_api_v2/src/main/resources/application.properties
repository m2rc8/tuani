server.port=8080
app.fingerprint.base-path=${HUELLA_BASE_PATH:${user.dir}/springboot_api_v2/data/huellas}
app.fingerprint.threshold=40
app.legacy.user-rnp-access=${LEGACY_USER_RNP_ACCESS:dev-raynel}
app.legacy.user-cont-access=${LEGACY_USER_CONT_ACCESS:PASSWORD}
app.legacy.user-app-access=${LEGACY_USER_APP_ACCESS:rnp_face_recognition}
app.audit.file-path=${AUDIT_FILE_PATH:${user.dir}/springboot_api_v2/logs/requests-audit.log}
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=10MB
management.endpoints.web.exposure.include=health,info
app.security.api-key=${API_KEY:dev-key-insecure}
app.rate-limit.capacity=100
app.rate-limit.refill-per-second=50
