[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'python manage.py migrate --noinput && gunicorn glitchtip.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 60'"
healthcheckPath = "/healthz/"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
